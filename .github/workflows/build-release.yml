name: Build & Release Installer

on:
  push:
    branches: [main]

# Only run one build at a time per branch
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install llama-cpp-python (CPU)
        run: |
          pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Download Poppler (for pdf2image OCR)
        shell: pwsh
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip"
          Invoke-WebRequest -Uri $url -OutFile poppler.zip
          Expand-Archive -Path poppler.zip -DestinationPath poppler_extract
          # Find the bin directory containing poppler executables
          $binDir = Get-ChildItem -Path poppler_extract -Recurse -Filter "pdftoppm.exe" | Select-Object -First 1
          if ($binDir) {
            $popplerRoot = $binDir.Directory.Parent.FullName
            if (Test-Path "build_tools/poppler") { Remove-Item -Recurse -Force "build_tools/poppler" }
            Copy-Item -Path $popplerRoot -Destination "build_tools/poppler" -Recurse
            Write-Host "Poppler installed from: $popplerRoot"
            Get-ChildItem "build_tools/poppler" -Recurse -Name | Select-Object -First 10
          } else {
            Write-Host "WARNING: Poppler binaries not found, creating empty directory"
            New-Item -ItemType Directory -Force -Path "build_tools/poppler/bin" | Out-Null
          }

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress

      - name: Configure Qt for headless CI
        shell: pwsh
        run: |
          # Find PyQt5 platform plugins so PyInstaller's Qt hooks don't crash
          $pyqt5 = python -c "import PyQt5; print(PyQt5.__file__)" 2>$null
          if ($pyqt5) {
            $pluginsDir = Join-Path (Split-Path $pyqt5) "Qt5\plugins"
            $platformsDir = Join-Path $pluginsDir "platforms"
            Write-Host "PyQt5 plugins: $pluginsDir"
            Write-Host "Platforms dir exists: $(Test-Path $platformsDir)"
            if (Test-Path $platformsDir) {
              Get-ChildItem $platformsDir -Name
              echo "QT_PLUGIN_PATH=$pluginsDir" >> $env:GITHUB_ENV
              echo "QT_QPA_PLATFORM_PLUGIN_PATH=$platformsDir" >> $env:GITHUB_ENV
            }
          }
          # Use 'minimal' platform (always available with PyQt5)
          echo "QT_QPA_PLATFORM=minimal" >> $env:GITHUB_ENV

      - name: Diagnose PyInstaller environment
        shell: pwsh
        run: |
          Write-Host "=== Testing PyInstaller import ==="
          python -c "import PyInstaller; print('PyInstaller version:', PyInstaller.__version__)"
          Write-Host "=== Testing PyQt5 import ==="
          python -c "import PyQt5; print('PyQt5 path:', PyQt5.__file__)"
          Write-Host "=== Testing PyInstaller CLI ==="
          python -m PyInstaller --version
          Write-Host "=== Testing spec eval ==="
          python -c "from PyInstaller.utils.hooks import collect_data_files; print('collect_data_files works')"
          Write-Host "=== Env vars ==="
          Write-Host "QT_QPA_PLATFORM=$env:QT_QPA_PLATFORM"
          Write-Host "QT_PLUGIN_PATH=$env:QT_PLUGIN_PATH"

      - name: Build application (PyInstaller)
        run: |
          python build_tools/build.py --target gui

      - name: Build installer (NSIS)
        run: |
          python build_tools/build.py --target installer

      - name: Verify outputs
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/CR2A_Setup.exe")) {
            Write-Error "CR2A_Setup.exe not found!"
            exit 1
          }
          $size = (Get-Item "dist/CR2A_Setup.exe").Length / 1MB
          Write-Host "Installer size: $([math]::Round($size, 2)) MB"

      - name: Update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: CR2A
          name: CR2A 1.1
          files: dist/CR2A_Setup.exe
          body: |
            ## CR2A Contract Analysis

            Auto-built from commit ${{ github.sha }}.

            Download and run `CR2A_Setup.exe` to install.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
