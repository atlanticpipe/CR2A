name: Build & Release Installer

on:
  push:
    branches: [main]

# Only run one build at a time per branch
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install llama-cpp-python (CPU)
        run: |
          pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Download Poppler (for pdf2image OCR)
        shell: pwsh
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip"
          Invoke-WebRequest -Uri $url -OutFile poppler.zip
          Expand-Archive -Path poppler.zip -DestinationPath poppler_extract
          # Move the inner directory to build_tools/poppler
          $inner = Get-ChildItem poppler_extract -Directory | Select-Object -First 1
          if (Test-Path "build_tools/poppler") { Remove-Item -Recurse -Force "build_tools/poppler" }
          Move-Item "$($inner.FullName)/Library" "build_tools/poppler"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress

      - name: Build application (PyInstaller + NSIS)
        run: |
          python build_tools/build.py --target all

      - name: Verify outputs
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/CR2A_Setup.exe")) {
            Write-Error "CR2A_Setup.exe not found!"
            exit 1
          }
          $size = (Get-Item "dist/CR2A_Setup.exe").Length / 1MB
          Write-Host "Installer size: $([math]::Round($size, 2)) MB"

      - name: Update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: CR2A
          name: CR2A 1.1
          files: dist/CR2A_Setup.exe
          body: |
            ## CR2A Contract Analysis

            Auto-built from commit ${{ github.sha }}.

            Download and run `CR2A_Setup.exe` to install.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
